<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1400" viewBox="0 0 1100 1400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff1d2"/>
      <stop offset="1" stop-color="#e9fff3"/>
    </linearGradient>
    <linearGradient id="tealPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#127a72"/>
      <stop offset="0.55" stop-color="#095c59"/>
      <stop offset="1" stop-color="#064449"/>
    </linearGradient>
    <linearGradient id="redPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7868"/>
      <stop offset="1" stop-color="#eb403f"/>
    </linearGradient>
    <linearGradient id="creamPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff9eb"/>
      <stop offset="1" stop-color="#fff1d5"/>
    </linearGradient>
    <linearGradient id="cardPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf5"/>
      <stop offset="1" stop-color="#fff1d7"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#36bfb7"/>
      <stop offset="1" stop-color="#168a86"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe066"/>
      <stop offset="0.55" stop-color="#ffbc2e"/>
      <stop offset="1" stop-color="#f28816"/>
    </linearGradient>
    <linearGradient id="lime" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8ef57"/>
      <stop offset="1" stop-color="#51b83a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="7" flood-color="#24323a" flood-opacity="0.22"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#24323a" flood-opacity="0.16"/>
    </filter>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .outline { stroke:#2d2236; stroke-width:10; stroke-linecap:round; stroke-linejoin:round; }
      .thin { stroke:#2d2236; stroke-width:6; stroke-linecap:round; stroke-linejoin:round; }
      .tiny { stroke:#2d2236; stroke-width:4; stroke-linecap:round; stroke-linejoin:round; }
      .hl { fill:none; stroke:#ffffff; stroke-width:7; stroke-linecap:round; opacity:.45; }
      .label { font-family: "Arial Rounded MT Bold", "Arial", sans-serif; font-weight:800; fill:#ffffff; }
      .darkText { font-family: "Arial Rounded MT Bold", "Arial", sans-serif; font-weight:800; fill:#3d2b4b; }
      .smallText { font-family: "Arial", sans-serif; font-weight:700; fill:#6f5b73; letter-spacing:0; }
    </style>
  </defs>

  <rect width="1100" height="1400" fill="url(#bg)"/>
  <circle cx="70" cy="90" r="130" fill="#2ab0a7" opacity=".07"/>
  <circle cx="1030" cy="1240" r="190" fill="#ff7c60" opacity=".06"/>

  <text x="54" y="76" class="darkText" font-size="36">UI style sample v2</text>
  <text x="55" y="112" class="smallText" font-size="20">Polished casual mobile game UI. Text will be rendered in Cocos.</text>

  <!-- Top HUD row -->
