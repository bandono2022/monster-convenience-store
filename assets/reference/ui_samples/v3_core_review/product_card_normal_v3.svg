<svg xmlns="http://www.w3.org/2000/svg" width="280" height="360" viewBox="0 0 280 360">
  <defs>
    <linearGradient id="cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf3"/>
      <stop offset="1" stop-color="#fff0d6"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2db6ad"/>
      <stop offset="1" stop-color="#0d7774"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe56a"/>
      <stop offset="1" stop-color="#f49a1b"/>
    </linearGradient>
    <filter id="drop" x="-15%" y="-12%" width="130%" height="130%">
      <feDropShadow dx="0" dy="9" stdDeviation="5" flood-color="#4b3540" flood-opacity=".2"/>
    </filter>
    <style>
      .dark{stroke:#2c2438;stroke-width:8;stroke-linejoin:round;stroke-linecap:round}
      .mid{stroke:#2c2438;stroke-width:5;stroke-linejoin:round;stroke-linecap:round}
      .slot{fill:#fff6e4;stroke:#b99f7c;stroke-width:4;stroke-dasharray:12 8;stroke-linecap:round}
    </style>
  </defs>
  <g filter="url(#drop)">
    <rect x="18" y="18" width="244" height="324" rx="34" fill="url(#teal)" class="dark"/>
    <rect x="30" y="30" width="220" height="300" rx="27" fill="url(#cream)"/>
    <path d="M47 44 C91 28 191 28 230 43" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity=".55"/>
    <rect x="78" y="70" width="124" height="124" rx="22" class="slot"/>
    <rect x="58" y="221" width="164" height="28" rx="14" fill="#e8d5b8" opacity=".8"/>
    <rect x="68" y="275" width="144" height="52" rx="26" fill="url(#teal)" class="mid"/>
    <circle cx="92" cy="301" r="22" fill="url(#gold)" class="mid"/>
    <path d="M83 292 L96 284 H111 L98 292 Z M83 292 V308 L98 316 V299 Z M98 299 L111 291 V308 L98 316 Z" fill="#d99d35" stroke="#694b22" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="124" y="291" width="58" height="16" rx="8" fill="#fff4df" opacity=".9"/>
  </g>
</svg>
