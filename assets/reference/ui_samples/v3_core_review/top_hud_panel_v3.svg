<svg xmlns="http://www.w3.org/2000/svg" width="880" height="150" viewBox="0 0 880 150">
  <defs>
    <linearGradient id="hudBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2fb9b0"/>
      <stop offset=".48" stop-color="#168b86"/>
      <stop offset="1" stop-color="#096767"/>
    </linearGradient>
    <linearGradient id="hudInset" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c938d"/>
      <stop offset="1" stop-color="#0b595b"/>
    </linearGradient>
    <linearGradient id="coinGold" x1="0" y1="0" x2="0" y2="1">
